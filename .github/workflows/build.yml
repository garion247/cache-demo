name: Build

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules with fallback
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: |
          if [ "${{ steps.cache-modules.outputs.cache-hit }}" = "true" ]; then
            echo "Exact cache hit - skipping npm ci"
          else
            echo "Partial or no cache - running npm ci to reconcile"
            npm ci
          fi

      - run: npm test
