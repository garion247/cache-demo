name: Build

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache deps (invalidates on lockfile change)
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache build output (invalidates on source change)
        id: cache-build
        uses: actions/cache@v4
        with:
          path: dist
          key: build-${{ runner.os }}-${{ hashFiles('test.js', 'package.json') }}

      - name: Build
        run: |
          mkdir -p dist
          if [ "${{ steps.cache-build.outputs.cache-hit }}" = "true" ]; then
            echo "Build cache hit - skipping rebuild"
          else
            echo "Building..."
            node test.js > dist/build.txt
          fi

      - run: npm test
